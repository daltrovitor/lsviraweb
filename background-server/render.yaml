services:
  - type: web
    name: background-server
    env: node
    buildCommand: npm install && PUPPETEER_CACHE_PATH=/opt/render/project/.cache/puppeteer npx puppeteer browsers install chrome && npm run build
    startCommand: npm start
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: PUPPETEER_CACHE_PATH
        value: /opt/render/project/.cache/puppeteer

